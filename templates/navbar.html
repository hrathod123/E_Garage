<div class="dropdown">
    <a class="nav-link dropdown-toggle d-flex align-items-center text-white" href="#" data-bs-toggle="dropdown">
        <img src="{{ user.avatar.url }}" class="rounded-circle me-2" width="32" height="32" style="object-fit: cover;">
        <span>Hi, {{ user.username }}</span> </a>

    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4 mt-2 py-2">
        <li class="px-3 py-1 fw-bold border-bottom">{{ user.username }}</li>
        
        <li><a class="dropdown-item" href="{% url 'edit_profile' %}">
            <i class="bi bi-person me-2 text-primary"></i> Edit Profile
        </a></li>

        {% if user.role == 'provider' %}
            <li><a class="dropdown-item" href="{% url 'garage_console' %}">
                <i class="bi bi-tools me-2 text-primary"></i> Garage Console
            </a></li>
        {% endif %}

        <li><hr class="dropdown-divider"></li>
        
        <li>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="dropdown-item text-danger">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </button>
            </form>
        </li>
    </ul>
</div>
