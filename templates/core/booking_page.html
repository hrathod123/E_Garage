{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
    }

    .booking-card {
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        color: white;
    }

    .booking-title {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .form-control {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        border-radius: 10px;
        padding: 12px;
    }

    .form-control::placeholder {
        color: #ccc;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #00c6ff;
        background: rgba(255,255,255,0.15);
    }

    .btn-book {
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-size: 18px;
        font-weight: 600;
        transition: 0.3s ease;
    }

    .btn-book:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 114, 255, 0.4);
    }

    .label-text {
        font-size: 14px;
        color: #ccc;
        margin-bottom: 8px;
    }

</style>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="col-md-6">
        
        <div class="text-center mb-4">
            <h2 class="booking-title">🚗 Book Service</h2>
            <p class="text-light opacity-75">{{ service.title }}</p>
        </div>

        <div class="booking-card p-5">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="label-text">{{ form.booking_date.label }}</label>
                    {{ form.booking_date }}

                    {% if form.booking_date.errors %}
                        <div class="text-danger small mt-2">
                            {{ form.booking_date.errors }}
                        </div>
                    {% endif %}
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-book text-white">
                        Confirm Booking 🚀
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>

{% endblock %}
