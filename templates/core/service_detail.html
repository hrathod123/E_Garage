{% extends 'base.html' %}

{% block content %}
<div class="container py-5">

    <div class="row g-5 align-items-start">

        <!-- IMAGE SECTION -->
        <div class="col-lg-6">
            <div class="service-image-card">
                {% if service.image %}
                    <img src="{{ service.image.url }}" alt="{{ service.title }}">
                {% else %}
                    <div class="placeholder">
                        <i class="bi bi-tools"></i>
                    </div>
                {% endif %}
            </div>
        </div>

        <!-- DETAILS SECTION -->
        <div class="col-lg-6">
            <div class="service-content">

                <!-- TITLE -->
                <h1 class="service-title">{{ service.title }}</h1>

                <!-- PROVIDER -->
                <div class="provider">
                    <div class="avatar">
                        <i class="bi bi-person"></i>
                    </div>
                    <div>
                        <p class="mb-0 text-muted small">Provided by</p>
                        <h6 class="mb-0 fw-bold text-primary">
                            {{ service.provider.username }}
                        </h6>
                    </div>
                </div>

                <!-- PRICE + STATUS -->
                <div class="price-box">
                    <h2>₹{{ service.price }}</h2>
                    <span class="status">
                        <i class="bi bi-check-circle-fill"></i> Available
                    </span>
                </div>

                <!-- DESCRIPTION -->
                <div class="description">
                    <h5>About Service</h5>
                    <p>{{ service.description|linebreaks }}</p>
                </div>

                <!-- BUTTONS -->
                <div class="action-buttons">
                    <a href="{% url 'book_service' service.id %}" class="btn btn-book">
                        <i class="bi bi-calendar-check"></i> Book Now
                    </a>

                    <a href="{% url 'service_list' %}" class="btn btn-back">
                        Back
                    </a>
                </div>

                <!-- FEATURES -->
                <div class="features">
                    <div>
                        <i class="bi bi-shield-check"></i>
                        <p>Secure</p>
                    </div>
                    <div>
                        <i class="bi bi-patch-check"></i>
                        <p>Verified</p>
                    </div>
                    <div>
                        <i class="bi bi-lightning-charge"></i>
                        <p>Fast</p>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<style>

/* IMAGE CARD */
.service-image-card {
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    background: #fff;
}

.service-image-card img {
    width: 100%;
    height: 520px;
    object-fit: cover;
    transition: 0.4s;
}

.service-image-card img:hover {
    transform: scale(1.05);
}

/* PLACEHOLDER */
.placeholder {
    height: 520px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f6f9;
}

.placeholder i {
    font-size: 60px;
    color: #bbb;
}

/* CONTENT */
.service-content {
    padding: 10px 10px;
}

/* TITLE */
.service-title {
    font-size: 2.5rem;
    font-weight: 700;
}

/* PROVIDER */
.provider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 15px 0;
}

.provider .avatar {
    width: 45px;
    height: 45px;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* PRICE */
.price-box {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 20px 0;
}

.price-box h2 {
    font-weight: 700;
    color: #28a745;
}

.status {
    background: #e6f7ee;
    color: #28a745;
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 14px;
}

/* DESCRIPTION */
.description {
    margin-top: 20px;
}

.description h5 {
    font-weight: 600;
    margin-bottom: 10px;
}

/* BUTTONS */
.action-buttons {
    margin-top: 30px;
    display: flex;
    gap: 15px;
}

.btn-book {
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color: white;
    padding: 12px 28px;
    border-radius: 50px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-book:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.btn-back {
    border: 1px solid #ccc;
    padding: 12px 25px;
    border-radius: 50px;
}

/* FEATURES */
.features {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.features div {
    text-align: center;
}

.features i {
    font-size: 22px;
    color: #2a5298;
}

.features p {
    margin: 5px 0 0;
    font-size: 14px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .service-title {
        font-size: 2rem;
    }

    .service-image-card img,
    .placeholder {
        height: 300px;
    }

    .features {
        flex-direction: column;
        gap: 15px;
    }
}

</style>

{% endblock %}
