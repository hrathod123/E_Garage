{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-dark text-white border-secondary shadow-lg p-4 text-center" style="border-radius: 20px;">
                <h2 class="fw-bold mb-4">Secure Checkout</h2>
                <div class="mb-4">
                    <p class="text-secondary mb-1">Service</p>
                    <h5>{{ booking.service.title }}</h5>
                </div>
                <hr class="border-secondary">
                <div class="mb-5">
                    <p class="text-secondary mb-1">Total Payable</p>
                    <h2 class="text-primary">₹{{ booking.service.price }}</h2>
                </div>

                <form action="{% url 'payment_success_logic' booking.id %}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold text-uppercase rounded-pill shadow-sm">
                        Confirm & Pay Now
                    </button>
                </form>

                <div class="mt-3">
                    <a href="{% url 'customer_dashboard' %}" class="text-decoration-none text-secondary small">
                        Cancel Payment
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
