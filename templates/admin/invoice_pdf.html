<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; }
        .invoice-box { border: 1px solid #eee; padding: 30px; }
        .header { text-align: center; color: #333; }
    </style>
</head>
<body>
    <div class="invoice-box">
        <h1 class="header">eGarage - Service Receipt</h1>
        <p><strong>Customer:</strong> {{ booking.customer.username }}</p>
        <p><strong>Service:</strong> {{ booking.service.title }}</p>
        <p><strong>Amount Paid:</strong> ₹{{ booking.service.price }}</p>
        <p><strong>Date:</strong> {{ booking.booking_date }}</p>
        <p><strong>Status:</strong> Success (Internal Simulation)</p>
    </div>
</body>
</html>
