{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-6">
            <div class="text-center mb-5">
                <h2 class="fw-bold text-white mb-2">List Premium Service</h2>
                <p class="text-secondary">Expand your workshop's digital catalog with a new offering.</p>
            </div>

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="background: #1a1d21; border: 1px solid #2d3238 !important;">
                <div class="accent-line"></div>
                
                <div class="card-body p-4 p-md-5">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="row g-4">
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-uppercase text-primary-emphasis">Service Name</label>
                                <input type="text" name="title" class="form-control dark-input" 
                                       placeholder="e.g. Interior Deep Cleaning" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-primary-emphasis">Category</label>
                                <select name="category" class="form-select dark-input" required>
                                    <option value="" disabled selected>Select Category</option>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}" style="background-color: #252a30; color: white;">
                                            {{ cat.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                                <small class="text-secondary">Don't see your category? Contact admin.</small>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-primary-emphasis">Price (₹)</label>
                                <div class="input-group">
                                    <span class="input-group-text dark-input border-end-0 text-secondary">₹</span>
                                    <input type="number" name="price" class="form-control dark-input border-start-0 ps-0" 
                                           placeholder="2999" required>
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label small fw-bold text-uppercase text-primary-emphasis">Description</label>
                                <textarea name="description" rows="4" class="form-control dark-input" 
                                          placeholder="Detail what is included in this premium service..." required></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label small fw-bold text-uppercase text-primary-emphasis">Cover Image</label>
                                <div class="upload-box rounded-3 text-center">
                                    <i class="bi bi-cloud-arrow-up text-primary fs-2"></i>
                                    <input type="file" name="image" class="form-control mt-2" id="serviceImg" required>
                                    <p class="small text-secondary mt-2 mb-0">Drag and drop or click to browse</p>
                                </div>
                            </div>

                            <div class="col-12 mt-5">
                                <button type="submit" class="btn btn-glow w-100 py-3 fw-bold text-uppercase">
                                    Publish Service
                                </button>
                                <div class="text-center mt-3">
                                    <a href="{% url 'provider_dashboard' %}" class="text-decoration-none text-secondary small hover-white">
                                        <i class="bi bi-chevron-left"></i> Back to Dashboard
                                    </a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>

    .navbar{
        display:none !important;
    }
    /* Dark Theme Foundation */
    body { 
        background-color: #0f1113; 
        color: #e9ecef;
    }

    /* Custom Dark Inputs */
    .dark-input {
        background-color: #252a30 !important;
        border: 1px solid #343a40 !important;
        color: #ffffff !important;
        padding: 12px 16px;
        border-radius: 10px !important;
        transition: all 0.3s ease;
    }
    
    .dark-input::placeholder { color: #6c757d; }

    .dark-input:focus {
        background-color: #2d343c !important;
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15) !important;
        outline: none;
    }

    /* Upload Box Styling */
    .upload-box {
        border: 2px dashed #343a40;
        background: #1a1d21;
        padding: 30px;
        transition: 0.3s;
        cursor: pointer;
    }
    .upload-box:hover {
        border-color: #0d6efd;
        background: #212529;
    }
    .upload-box input[type="file"] {
        color: #6c757d;
        font-size: 0.9rem;
    }

    /* Glow Button Animation */
    .btn-glow {
        background: #0d6efd;
        color: white;
        border: none;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        transition: 0.3s;
    }
    .btn-glow:hover {
        background: #0b5ed7;
        box-shadow: 0 0 20px rgba(13, 110, 253, 0.5);
        transform: translateY(-2px);
    }

    /* Accent Line Decor */
    .accent-line {
        height: 4px;
        width: 100%;
        background: linear-gradient(90deg, #0d6efd, #00d4ff, #0d6efd);
        background-size: 200% auto;
        animation: gradientMove 3s linear infinite;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
    }

    .hover-white:hover { color: #fff !important; }
    
    /* Clean Select Arrow for Dark Mode */
    .form-select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%236c757d' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
    }
</style>
{% endblock %}
